# CAT protocol — ViT-L LoRA r=32 (BEST: avg F1 = 0.847)
# Training set: CASIA-v2 + FantasticReality + IMD2020 + TampCOCO (balanced)
# Test sets:    CASIAv1 / Columbia / NIST16 / Coverage

model: DINOv3ForensicsLoRA
dinov3_model_type: dinov3_vitl16
lora_rank: 32
lora_alpha: 64
image_size: 512
edge_lambda: 20.0

# Optimizer
lr: 3.0e-4
weight_decay: 0.05
epochs: 100
warmup_epochs: 5

# Data loading
batch_size: 24          # per-GPU
test_batch_size: 64
accum_iter: 10          # effective batch = 24 * 10 = 240
num_workers: 8
if_resizing: true
edge_mask_width: 7

# Evaluation
test_period: 4          # evaluate every 4 epochs

# Paths — set these to your local dataset JSON files
data_path: /path/to/balanced_dataset_cat.json
test_data_path: /path/to/test_datasets_cat.json

# DINOv3 backbone
dinov3_repo_path: /path/to/dinov3
dinov3_weights_path: /path/to/dinov3_vitl16_pretrain_lvd1689m.pth
