# CAT protocol — ViT-S LoRA r=32 (avg F1 = 0.704)
model: DINOv3ForensicsLoRA
dinov3_model_type: dinov3_vits16
lora_rank: 32
lora_alpha: 64
image_size: 512
edge_lambda: 20.0
lr: 3.0e-4
weight_decay: 0.05
epochs: 100
warmup_epochs: 5
batch_size: 32
test_batch_size: 64
accum_iter: 10
num_workers: 8
if_resizing: true
edge_mask_width: 7
test_period: 4
data_path: /path/to/balanced_dataset_cat.json
test_data_path: /path/to/test_datasets_cat.json
dinov3_repo_path: /path/to/dinov3
dinov3_weights_path: /path/to/dinov3_vits16_pretrain.pth
