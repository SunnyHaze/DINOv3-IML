# MVSS protocol — ViT-L LoRA r=64 (BEST: avg F1 = 0.774)
# Training set: CASIA-v2 only (5,123 tampered images)
# Test sets:    CASIAv1 / Columbia / NIST16 / Coverage / IMD2020

model: DINOv3ForensicsLoRA
dinov3_model_type: dinov3_vitl16
lora_rank: 64
lora_alpha: 128
image_size: 512
edge_lambda: 20.0
lr: 3.0e-4
weight_decay: 0.05
epochs: 100
warmup_epochs: 5
batch_size: 24
test_batch_size: 64
accum_iter: 10
num_workers: 8
if_resizing: true
edge_mask_width: 7
test_period: 4
data_path: /path/to/casia2_tampered.json
test_data_path: /path/to/test_datasets_mvss.json
dinov3_repo_path: /path/to/dinov3
dinov3_weights_path: /path/to/dinov3_vitl16_pretrain_lvd1689m.pth
